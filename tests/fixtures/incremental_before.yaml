# "Previous compile" for the incremental-compilation report
# (examples/generate_incremental_report.py, tests/test_incremental_report.py).
# incremental_after.yaml is the same graph one commit later: dbPassword's
# rotation policy changed, network.oldVnet was decommissioned, and
# storage.archive was added.
metadata:
  name: incremental-report-example
spec:
  resources:
    - capability: network
      name: vpc
      properties: {}

    - capability: storage
      name: bucket1
      dependsOn: ["network.vpc"]
      properties: {}

    - capability: storage
      name: bucket2
      dependsOn: ["network.vpc"]
      properties: {}

    - capability: secret
      name: dbPassword
      dependsOn: ["network.vpc"]
      properties:
        rotation: 90

    - capability: compute
      name: appServer
      dependsOn: ["storage.bucket1", "storage.bucket2", "secret.dbPassword"]
      properties: {}

    - capability: governance
      name: catalog
      dependsOn: ["compute.appServer"]
      properties: {}

    - capability: network
      name: oldVnet
      properties: {}
